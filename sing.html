<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaSoapOpera</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <h1>NinjaSoapOpera</h1>
        <nav>
            <a href="index.html" class="nav-button">Home</a>
            <a href="about.html" class="nav-button">About Us</a>
            <a href="#playlist-section" class="nav-button">Music</a>
            <a href="sing.html" class="nav-button">Sing Practice</a>
        </nav>
    </header>
    <main class="container">
        <section id="sing-setup">
            <h2>Singing Practice</h2>
            <p>Test your pitch against the target melody!</p>
            <button id="startBtn" class="nav-button" style="color: black; border-color: black;">Start Practice</button>
            <p id="status">Waiting to start...</p>
        </section>
        
        <section id="graph-section">
            <!-- The canvas is where JavaScript will draw our graph -->
            <canvas id="pitchGraph" width="800" height="400" style="background: #222; border-radius: 8px; width: 100%;"></canvas>
        </section>
    </main>

    <script src="js/singEngine.js"></script>
    <script src="js/singUI.js"></script>
    <script src="js/sing.js"></script>
</body>
</html>
